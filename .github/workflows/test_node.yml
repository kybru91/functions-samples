name: 2nd Gen CI Tests

on:
  pull_request:
    paths:
      - 'Node/**'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'tsconfig.template.json'
  push:
    branches:
      - main
    paths:
      - 'Node/**'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'tsconfig.template.json'

env:
  CI: true

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          # The latest Node version for 2nd gen
          # https://cloud.google.com/functions/docs/runtime-support#node.js
          - 22.x
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache npm
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}

      - run: npm install
      - run: npm run bootstrap-2nd-gen
      - run: npm run lint-2nd-gen
      - run: npm run compile-2nd-gen
      - run: npm run test-2nd-gen
